<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IoT Architecture Diagram</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans+Thai:wght@300;400;600&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0e1a;
    font-family: 'IBM Plex Sans Thai', monospace;
    color: #e0e8ff;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 40px 20px;
    overflow-x: hidden;
  }
  h1 {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 13px;
    letter-spacing: 4px;
    color: #4a9eff;
    text-transform: uppercase;
    margin-bottom: 8px;
    opacity: 0.7;
  }
  h2 {
    font-size: 22px;
    font-weight: 300;
    color: #c8d8ff;
    margin-bottom: 48px;
    letter-spacing: 1px;
    text-align: center;
  }
  .diagram {
    width: 100%;
    max-width: 960px;
    position: relative;
  }
  svg {
    width: 100%;
    height: auto;
    overflow: visible;
  }
  .flow-line {
    stroke-dasharray: 8 4;
    animation: dash 1.5s linear infinite;
  }
  @keyframes dash {
    to { stroke-dashoffset: -24; }
  }
  .flow-line-rev {
    stroke-dasharray: 8 4;
    animation: dash-rev 1.5s linear infinite;
  }
  @keyframes dash-rev {
    to { stroke-dashoffset: 24; }
  }
  .pulse {
    animation: pulse 2s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.5; }
  }
  .legend {
    margin-top: 40px;
    display: flex;
    gap: 32px;
    flex-wrap: wrap;
    justify-content: center;
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 12px;
    color: #7a8ab0;
    font-family: 'IBM Plex Mono', monospace;
  }
  .legend-line {
    width: 32px;
    height: 2px;
  }
</style>
</head>
<body>

<h1>System Architecture</h1>
<h2>Home Assistant · Speckle · MQTT · IoT</h2>

<div class="diagram">
<svg viewBox="0 0 960 620" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="glow">

      <feMerge><feMergeNode in="blur"></feMergeNode><feMergeNode in="SourceGraphic"></feMergeNode></feMerge>
    </filter>
    <filter id="glow-strong">
      <feGaussianBlur stdDeviation="5" result="blur"></feGaussianBlur>
      <feMerge><feMergeNode in="blur"></feMergeNode><feMergeNode in="SourceGraphic"></feMergeNode></feMerge>
    </filter>
    <marker id="arrow-blue" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#4a9eff"></path>
    </marker>
    <marker id="arrow-green" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#36d68c"></path>
    </marker>
    <marker id="arrow-orange" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#ff9a3c"></path>
    </marker>
    <marker id="arrow-purple" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#b06eff"></path>
    </marker>
    <linearGradient id="bg-ha" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a2a4a"></stop>
      <stop offset="100%" style="stop-color:#0f1a30"></stop>
    </linearGradient>
    <linearGradient id="bg-mqtt" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a3a2a"></stop>
      <stop offset="100%" style="stop-color:#0f2a1a"></stop>
    </linearGradient>
    <linearGradient id="bg-speckle" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2a1a3a"></stop>
      <stop offset="100%" style="stop-color:#1a0f2a"></stop>
    </linearGradient>
    <linearGradient id="bg-iot" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3a2a1a"></stop>
      <stop offset="100%" style="stop-color:#2a1a0f"></stop>
    </linearGradient>
  </defs>

  <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">

  <rect width="960" height="620" fill="url(#grid)" opacity="0.5"></rect>

  <text x="85" y="122" text-anchor="middle" fill="#c0a070" font-family="IBM Plex Sans Thai" font-size="10">Temp / Humidity</text>
  <text x="85" y="138" text-anchor="middle" fill="#806040" font-family="IBM Plex Mono" font-size="9">DHT22 Sensor</text>
  <circle cx="138" cy="88" r="4" fill="#ff9a3c" class="pulse" filter="url(#glow)"></circle>

  <rect x="20" y="185" width="130" height="70" rx="8" fill="url(#bg-iot)" stroke="#ff9a3c" stroke-width="1.5"></rect>
  <text x="85" y="210" text-anchor="middle" fill="#ff9a3c" font-family="IBM Plex Mono" font-size="11" font-weight="600">ESP32</text>
  <text x="85" y="227" text-anchor="middle" fill="#c0a070" font-family="IBM Plex Sans Thai" font-size="10">ประตู / หน้าต่าง</text>
  <text x="85" y="243" text-anchor="middle" fill="#806040" font-family="IBM Plex Mono" font-size="9">Reed Switch</text>

  <text x="85" y="315" text-anchor="middle" fill="#ff9a3c" font-family="IBM Plex Mono" font-size="11" font-weight="600">ESP8266</text>
  <text x="85" y="332" text-anchor="middle" fill="#c0a070" font-family="IBM Plex Sans Thai" font-size="10">ไฟ / Relay</text>
